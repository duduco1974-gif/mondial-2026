<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a2744" />
  <meta name="description" content="ניתוח משחקי מונדיאל 2026 בעזרת AI" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>מונדיאל 2026 🏆</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-title">
      <span class="trophy">🏆</span>
      <h1>מונדיאל 2026</h1>
    </div>
    <button class="install-btn" id="install-btn">התקן אפליקציה</button>
    <button class="sync-btn" id="sync-btn">🔗 סנכרן</button>
    <button class="live-btn" id="live-scores-btn">📡 עדכן תוצאות חי</button>
  </header>

  <!-- API KEY -->
  <div class="api-section">
    <label for="api-key-input">🔑 OpenAI API:</label>
    <input
      type="password"
      id="api-key-input"
      placeholder="sk-..."
      autocomplete="off"
    />
    <span class="api-status disconnected" id="api-status">לא מחובר</span>
  </div>

  <!-- TABS -->
  <div class="tabs-container">
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- MAIN -->
  <main id="main"></main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">ניתוח משחק</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="match-summary">
          <div class="summary-team">
            <span class="summary-flag" id="modal-home-flag"></span>
            <span class="summary-name" id="modal-home-name"></span>
          </div>
          <div class="summary-vs">VS</div>
          <div class="summary-team">
            <span class="summary-flag" id="modal-away-flag"></span>
            <span class="summary-name" id="modal-away-name"></span>
          </div>
        </div>
        <div class="analysis-container">
          <div id="analysis-area"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SYNC MODAL -->
  <div class="modal-overlay" id="sync-modal-overlay" style="display:none">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <h3>🔗 סינכרון בין מכשירים</h3>
        <button class="modal-close" id="sync-modal-close">✕</button>
      </div>
      <div class="modal-body" style="padding:1rem;display:flex;flex-direction:column;gap:1rem">
        <div>
          <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.5rem">
            <strong>שלב 1 — ייצא:</strong> לחץ "העתק קוד" ושלח לעצמך בוואטסאפ
          </p>
          <textarea id="sync-export-code" readonly
            style="width:100%;height:80px;font-size:0.7rem;background:var(--bg-primary);color:var(--text-secondary);border:1px solid var(--border);border-radius:8px;padding:0.5rem;resize:none;direction:ltr"></textarea>
          <button id="sync-copy-btn" style="width:100%;margin-top:0.4rem;padding:0.6rem;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem">
            📋 העתק קוד
          </button>
        </div>
        <hr style="border-color:var(--border)">
        <div>
          <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.5rem">
            <strong>שלב 2 — ייבא:</strong> הדבק את הקוד שקיבלת מהמכשיר השני
          </p>
          <textarea id="sync-import-code" placeholder="הדבק קוד כאן..."
            style="width:100%;height:80px;font-size:0.7rem;background:var(--bg-primary);color:var(--text-primary);border:1px solid var(--border);border-radius:8px;padding:0.5rem;resize:none;direction:ltr"></textarea>
          <button id="sync-import-btn" style="width:100%;margin-top:0.4rem;padding:0.6rem;background:#0d9488;color:white;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem">
            ✅ ייבא נתונים
          </button>
        </div>
        <p id="sync-status" style="text-align:center;font-size:0.9rem;min-height:1.2rem;color:#4ade80"></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="data.js"></script>
  <script src="knockout.js"></script>
  <script src="app.js"></script>
</body>
</html>
